version: '3.8'

services:
  droppad:
    build: .
    ports:
      - "5173:5173"
      - "8787:8787"
    environment:
      - VITE_API_BASE_URL=http://localhost:8787
      - APP_ENV=local
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - droppad-network

networks:
  droppad-network:
    driver: bridge
